{% extends "base.html" %}
{% block title %}Login — {{ settings.site_name }}{% endblock %}

{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;padding:3rem 0;background:linear-gradient(160deg,var(--bg) 0%,rgba(45,106,79,0.06) 100%);">
  <div class="container" style="display:flex;justify-content:center;">
    <div style="width:100%;max-width:460px;">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="width:60px;height:60px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.6rem;">🏪</div>
        <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--text);">Welcome Back</h1>
        <p style="opacity:0.6;margin-top:0.3rem;">Sign in to manage your stores</p>
      </div>

      <div class="card" style="padding:2.2rem;">
        <form method="POST" action="{{ url_for('login') }}">
          <div class="form-group">
            <label for="identifier">Username or Email</label>
            <input type="text" id="identifier" name="identifier" class="form-control"
                   placeholder="your@email.com or username" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Enter your password" required>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
            <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.88rem;font-weight:500;">
              <input type="checkbox" name="remember" style="width:16px;height:16px;accent-color:var(--primary);">
              Remember me
            </label>
          </div>
          <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:0.8rem;">
            Sign In →
          </button>
        </form>

        <hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0;">

        <p style="text-align:center;font-size:0.9rem;opacity:0.7;">
          Don't have an account?
          <a href="{{ url_for('register') }}" style="color:var(--primary);font-weight:600;">Register here</a>
        </p>
      </div>

      <p style="text-align:center;margin-top:1.2rem;font-size:0.82rem;opacity:0.5;">
        Default admin: <strong>admin</strong> / <strong>admin1234</strong>
      </p>
    </div>
  </div>
</section>
{% endblock %}
